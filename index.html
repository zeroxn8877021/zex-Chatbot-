<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Harshit Chat Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #0f0f0f; color: #f0f0f0; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 16px 24px; background: #1a1a1a; border-bottom: 1px solid #333; font-size: 1.2rem; font-weight: bold; }
    #chat { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 70%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; }
    .user { background: #2f6df5; align-self: flex-end; }
    .assistant { background: #1e1e1e; border: 1px solid #333; align-self: flex-start; }
    #input-bar { display: flex; padding: 16px; background: #1a1a1a; border-top: 1px solid #333; gap: 10px; }
    #input-bar input { flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: #fff; font-size: 1rem; }
    #input-bar button { padding: 12px 20px; background: #2f6df5; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    #input-bar button:hover { background: #1a5de0; }
    .typing { color: #888; font-style: italic; }
  </style>
</head>
<body>
  <header>🤖 Harshit Chat Bot</header>
  <div id="chat"></div>
  <div id="input-bar">
    <input id="user-input" type="text" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("user-input");
    let history = [];

    input.addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage();
    });

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      input.value = "";

      addMessage("user", text);
      history.push({ role: "user", content: text });

      const typing = addMessage("assistant", "Thinking...");
      typing.classList.add("typing");

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: history })
        });

        const data = await res.json();
        typing.classList.remove("typing");
        typing.textContent = data.reply;
        history.push({ role: "assistant", content: data.reply });

      } catch (err) {
        typing.textContent = "Error: " + err.message;
      }
    }
  </script>
</body>
</html>
